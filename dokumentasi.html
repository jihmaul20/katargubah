<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Dokumentasi Katar Gubah</title>
  <link rel="icon" type="image/png" href="logo-katar.png">
  <link rel="stylesheet" href="dokumentasi.css">
</head>
<body>

<!-- MAIN CONTENT -->
<main>
    <section id="dokumentasi" class="section">
        <h1>Dokumentasi Kegiatan</h1>
        <p class="subtitle">Lihat berbagai momen penting dalam kegiatan Karang Taruna Gunung Bahagia.</p>

        <!-- FILTER -->
        <div class="filter-container">
            <button class="filter-button" data-filter="all">Semua</button>
            <button class="filter-button" data-filter="kegiatan">Kegiatan</button>
            <button class="filter-button" data-filter="pelatihan">Pelatihan</button>
            <button class="filter-button" data-filter="sosial">Sosial</button>
        </div>

        <!-- GALLERY -->
        <div class="gallery">
            <div class="gallery-item" data-category="kegiatan">
            <img src="logo-katar.png" alt="Gambar 1">
            <div class="caption">Kegiatan Sosial 1</div>
            </div>
            <div class="gallery-item" data-category="pelatihan">
            <img src="logo-katar.png" alt="Gambar 1">
            <div class="caption">Pelatihan Kepemimpinan</div>
            </div>
            <div class="gallery-item" data-category="sosial">
            <img src="logo-katar.png" alt="Gambar 1">
            <div class="caption">Bantuan Sosial</div>
            </div>
            <!-- Tambahkan lebih banyak item sesuai kebutuhan -->
        </div>
    </section>
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2025 Karang Taruna Gunung Bahagia. All rights reserved.</p>
</footer>

<script src="dokumentasi.js"></script>
</body>
</html>
